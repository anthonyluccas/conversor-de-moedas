<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@400,700;1,700&display=swap" rel="stylesheet" />
  <title>Conversor de Moedas</title>
</head>

<body>
  <img class="logo" src="./assets/logo.gif" alt="logo-do-conversor-de-moedas" />

  <main>
    <label>
      Converter <b>de</b>
      <select>
        <option>R$ Real brasileiro</option>
      </select>
    </label>

    <label>
      Converter <b>para</b>
      <select>
        <option>US$ Dólar americano</option>
        <option>€ Euro</option>
      </select>
    </label>

    <label>
      <b>Valor</b>
      <input placeholder="R$10.000,00" />
    </label>

    <button onclick="">Converter</button>

    <section>
      <div class="caixa">
        <img src="./assets/real.png" alt="logo-moeda-a-converter" />
        <p class="moeda">Real</p>
        <p class="valor-moeda">R$ 0,00</p>
      </div>

      <img class="seta-img" src="./assets/seta.png" alt="Seta" />

      <div class="caixa">
        <img src="./assets/dolar.png" alt="logo-moeda-convertida" />
        <p class="moeda">Dólar Americano</p>
        <p class="valor-moeda">US$ 0,00</p>
      </div>
    </section>

  </main>

</body>

</html>
