<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@400,700;1,700&display=swap" rel="stylesheet" />
  <title>Conversor de Moedas</title>
</head>

<body>
  <img class="logo" src="./assets/logo.gif" alt="logo-do-conversor-de-moedas" />

  <main>
    <label>
      Converter <b>de</b>
      <select>
        <option>R$ Real brasileiro</option>
      </select>
    </label>

    <label>
      Converter <b>para</b>
      <select class="trocar-moeda">
        <option value="dolar">US$ Dólar americano</option>
        <option value="euro">€ Euro</option>
        <option value="libra">£ Libra</option>
        <option value="bitcoin">₿ Bitcoin</option>
      </select>
    </label>

    <label>
      <b>Valor</b>
      <input class="valor-para-converter" placeholder="R$10.000,00" />
    </label>

    <button class="botao-converter">Converter</button>

    <section>
      <div class="caixa">
        <img class="img-moeda-a-converter" src="./assets/real.png" alt="logo-moeda-a-converter" />
        <p class="nome-moeda-a-converter">Real</p>
        <p class="valor-converter">R$ 0,00</p>
      </div>

      <img class="seta-img" src="./assets/seta.png" alt="Seta" />

      <div class="caixa">
        <img class="img-moeda-convertida" src="./assets/dolar.png" alt="logo-moeda-convertida" />
        <p class="nome-moeda-convertida">Dólar Americano</p>
        <p class="valor-convertido">$0.00</p>
      </div>
    </section>

  </main>

</body>
<script src="script.js"></script>

</html>
